name: build

on:
  push:
    branches:
      - '*'
    tags:
      - v*
  pull_request:
    branches:
      - '*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        platform: [
          android-arm, android-arm64, android-x64, android-x86,
          darwin-x64,
          linux-armv6, linux-armv7, linux-armv7_softfp, linux-arm64, linux-x64, linux-x86,
          windows-x64, windows-x86 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Get tags
        run: |
          git fetch --tags origin
          git fetch --prune --unshallow

      - name: Get Go environment
        id: go-env
        run: |
          echo "cache=$(go env GOCACHE)" >> $GITHUB_ENV
          echo "modcache=$(go env GOMODCACHE)" >> $GITHUB_ENV

      - name: Set up cache
        uses: actions/cache@v3
        with:
          path: |
            ${{ env.cache }}
            ${{ env.modcache }}
          key: elementum-${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            elementum-${{ runner.os }}-go-

      - name: Build ${{ matrix.platform }}
        run: | 
          mkdir -p ~/.cache/go-build
          mkdir -p ~/.cache/go-cache
          make ${{ matrix.platform }} GOPATH="$(readlink -f ~/.cache/go-build)" GOCACHE="$(readlink -f ~/.cache/go-cache)"
          make ${{ matrix.platform }}-shared GOPATH="$(readlink -f ~/.cache/go-build)" GOCACHE="$(readlink -f ~/.cache/go-cache)"

      - name: Generate ${{ matrix.platform }} zip
        id: generate_zip
        run: |
          make zip PLATFORM=${{ matrix.platform }}
          asset_path=$(ls build/*.zip)
          echo "::set-output name=asset_path::${asset_path}"
          echo "::set-output name=asset_name::$(basename "${asset_path}")"

      - name: Upload ${{ matrix.platform }} zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ steps.generate_zip.outputs.asset_path }}
